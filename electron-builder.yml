appId: com.fonaredd.app
productName: Fonaredd App
copyright: Copyright © 2024 Fonaredd

directories:
  output: dist-electron
  buildResources: build

files:
  - out/**/*
  - electron/main.js
  - electron/preload.js
  - node_modules/**/*

mac:
  category: public.app-category.business
  target:
    - target: dmg
      arch:
        - x64
        - arm64

win:
  target:
    - target: nsis
      arch:
        - x64

linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
