# Configuration Nginx pour Fonaredd App
# À placer dans /etc/nginx/sites-available/fonaredd-app

server {
    listen 80;
    server_name 91.134.44.14; # Remplacez par votre domaine si vous en avez un

    # Taille maximale des uploads
    client_max_body_size 10M;

    location / {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Logs
    access_log /var/log/nginx/fonaredd-app-access.log;
    error_log /var/log/nginx/fonaredd-app-error.log;
}

