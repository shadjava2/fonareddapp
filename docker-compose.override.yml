# Développement local (fusionné avec docker-compose.yml si ce fichier est présent).
# Pour le serveur : renommez ou supprimez ce fichier, ou déployez avec -f docker-compose.yml seul.

services:
  app-dev:
    environment:
      - NODE_ENV=development
      - JWT_SECRET=${JWT_SECRET:-dev_jwt_secret_not_for_production}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-dev_nextauth_secret_not_for_production}
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "${FONAREDD_APP_DEV_PORT:-13000}:3000"
      - "${FONAREDD_APP_DEV_DEBUG_PORT:-19229}:9229"
