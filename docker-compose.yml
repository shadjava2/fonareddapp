# Variables requises dans .env : DATABASE_URL, JWT_SECRET, NEXTAUTH_URL, NEXTAUTH_SECRET
# OTP mot de passe oublié (SMTP, ex. Zoho) : EMAIL_SERVER_HOST, EMAIL_SERVER_USER, EMAIL_SERVER_PASSWORD, EMAIL_FROM ; optionnel EMAIL_SERVER_PORT, EMAIL_SERVER_SECURE, PASSWORD_RESET_OTP_SECRET
# Ports hôte (conflits) — surchargez dans .env :
#   FONAREDD_APP_DEV_PORT=13000  FONAREDD_APP_PROD_PORT=13001  FONAREDD_REDIS_PORT=16379
#   FONAREDD_CADDY_HTTP=18080
# Cloudflare Tunnel → http://127.0.0.1:${FONAREDD_CADDY_HTTP} (Caddy) ou directement app : ${FONAREDD_APP_PROD_PORT}
#
# MySQL : installé sur l’hôte ; dans DATABASE_URL utilisez host.docker.internal:3306
# (extra_hosts host-gateway est défini sur les services app).

services:
  # Application Next.js (développement)
  app-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: fonaredd-app-dev
    restart: unless-stopped
    ports:
      - "${FONAREDD_APP_DEV_PORT:-13000}:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - EMAIL_SERVER_HOST=${EMAIL_SERVER_HOST}
      - EMAIL_SERVER_PORT=${EMAIL_SERVER_PORT:-587}
      - EMAIL_SERVER_SECURE=${EMAIL_SERVER_SECURE:-}
      - EMAIL_SERVER_USER=${EMAIL_SERVER_USER}
      - EMAIL_SERVER_PASSWORD=${EMAIL_SERVER_PASSWORD}
      - EMAIL_FROM=${EMAIL_FROM}
      - PASSWORD_RESET_OTP_SECRET=${PASSWORD_RESET_OTP_SECRET:-}
    volumes:
      - .:/app
      - /app/node_modules
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - fonaredd-network

  # Application Next.js (production)
  app-prod:
    image: fonaredd-app-prod:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fonaredd-app-prod
    restart: unless-stopped
    ports:
      - "${FONAREDD_APP_PROD_PORT:-13001}:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - EMAIL_SERVER_HOST=${EMAIL_SERVER_HOST}
      - EMAIL_SERVER_PORT=${EMAIL_SERVER_PORT:-587}
      - EMAIL_SERVER_SECURE=${EMAIL_SERVER_SECURE:-}
      - EMAIL_SERVER_USER=${EMAIL_SERVER_USER}
      - EMAIL_SERVER_PASSWORD=${EMAIL_SERVER_PASSWORD}
      - EMAIL_FROM=${EMAIL_FROM}
      - PASSWORD_RESET_OTP_SECRET=${PASSWORD_RESET_OTP_SECRET:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - fonaredd-network

  # Reverse proxy (Cloudflare Tunnel → Caddy HTTP → app-prod)
  caddy:
    image: caddy:2-alpine
    container_name: fonaredd-caddy
    restart: unless-stopped
    ports:
      - "${FONAREDD_CADDY_HTTP:-18080}:80"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app-prod
    networks:
      - fonaredd-network

  # Redis (optionnel)
  redis:
    image: redis:7-alpine
    container_name: fonaredd-redis
    restart: unless-stopped
    ports:
      - "${FONAREDD_REDIS_PORT:-16379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - fonaredd-network

volumes:
  caddy_data:
  caddy_config:
  redis_data:

networks:
  fonaredd-network:
    driver: bridge
