version: "3.8"

services:
  # Base de données MySQL
  mysql:
    image: mysql:8.0
    container_name: fonaredd-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: fonaredd_db
      MYSQL_USER: fonaredd
      MYSQL_PASSWORD: fonaredd123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    networks:
      - fonaredd-network
    command: --default-authentication-plugin=mysql_native_password

  # Application Next.js (développement)
  app-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: fonaredd-app-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=mysql://fonaredd:fonaredd123@mysql:3306/fonaredd_db
      - JWT_SECRET=your_jwt_secret_key_here_very_long_and_secure
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=your_nextauth_secret_here
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - mysql
    networks:
      - fonaredd-network

  # Application Next.js (production)
  app-prod:
    image: fonaredd-app-prod:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fonaredd-app-prod
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=mysql://fonaredd:fonaredd123@mysql:3306/fonaredd_db
      - JWT_SECRET=your_jwt_secret_key_here_very_long_and_secure
      - NEXTAUTH_URL=http://localhost:3001
      - NEXTAUTH_SECRET=your_nextauth_secret_here
    depends_on:
      - mysql
    networks:
      - fonaredd-network

  # Redis pour le cache (optionnel)
  redis:
    image: redis:7-alpine
    container_name: fonaredd-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - fonaredd-network

  # Nginx reverse proxy (optionnel)
  nginx:
    image: nginx:alpine
    container_name: fonaredd-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/ssl:/etc/nginx/ssl
    depends_on:
      - app-prod
    networks:
      - fonaredd-network

volumes:
  mysql_data:
  redis_data:

networks:
  fonaredd-network:
    driver: bridge
